<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCSD Test — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #e94560;
            font-size: 24px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #a0a0b0;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #e94560;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #c73652; }
        #status {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            min-height: 20px;
        }
        .success { color: #4ecca3; }
        .error { color: #e94560; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>OCSD Test Login</h1>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="off">
        <button id="login-btn" onclick="handleLogin()">Log In</button>
        <div id="status"></div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const status = document.getElementById('status');

            if (user === 'ocsd' && pass === 'test123') {
                status.textContent = 'Login successful!';
                status.className = 'success';
                document.title = 'OCSD Test — Dashboard';
            } else {
                status.textContent = 'Invalid credentials.';
                status.className = 'error';
            }
        }
    </script>
</body>
</html>
